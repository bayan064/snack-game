<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇 Snake Game</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(13, 20, 36, 0.82);
      --panel-border: rgba(148, 163, 184, 0.2);
      --text: #e5eefc;
      --muted: #9bb0d0;
      --accent: #70e000;
      --accent-2: #27c9ff;
      --danger: #ff6b6b;
      --grid: rgba(148, 163, 184, 0.08);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(39, 201, 255, 0.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(112, 224, 0, 0.14), transparent 28%),
        linear-gradient(135deg, #07111f 0%, #0b1220 50%, #121c33 100%);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 100%);
      pointer-events: none;
      opacity: 0.55;
    }

    .app {
      width: min(1080px, calc(100vw - 24px));
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(280px, 0.8fr);
      gap: 20px;
      align-items: center;
    }

    .stage, .panel {
      border: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .stage {
      position: relative;
      border-radius: 28px;
      padding: 18px;
    }

    .frame {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(5, 10, 19, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .badge {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .overlay {
      position: absolute;
      inset: 18px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(7, 12, 23, 0.12), rgba(7, 12, 23, 0.76));
      text-align: center;
      padding: 24px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.02);
    }

    .overlay h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1;
      letter-spacing: 0.04em;
    }

    .overlay p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    .overlay strong {
      color: var(--text);
    }

    .panel {
      border-radius: 24px;
      padding: 24px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .panel p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin: 18px 0 22px;
    }

    .key-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .key {
      min-width: 48px;
      padding: 10px 14px;
      border-radius: 12px;
      text-align: center;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .key.space {
      min-width: 120px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      color: #08111e;
      background: linear-gradient(135deg, var(--accent), #d5ff68);
      box-shadow: 0 10px 24px rgba(112, 224, 0, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(112, 224, 0, 0.3);
    }

    button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: none;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      line-height: 1.65;
    }

    .status strong {
      color: var(--text);
    }

    .mini {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .mini span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-2);
      box-shadow: 0 0 16px rgba(39, 201, 255, 0.7);
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        width: min(680px, calc(100vw - 20px));
        padding: 16px 0;
      }

      .panel {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="Snake game stage">
      <div class="hud">
        <div class="badge">分数 <span id="score">0</span></div>
        <div class="badge">最高分 <span id="bestScore">0</span></div>
        <div class="badge" id="stateBadge">准备开始</div>
      </div>
      <div class="frame">
        <canvas id="game" width="640" height="640" aria-label="Snake game canvas"></canvas>
        <div class="overlay" id="overlay">
          <div>
            <h1>贪吃蛇</h1>
            <p>方向键或 <strong>WASD</strong> 控制，按 <strong>空格</strong> 暂停/继续。<br />
            吃掉食物，尽量别撞墙，也别咬到自己。</p>
          </div>
        </div>
      </div>
    </section>

    <aside class="panel">
      <h2>操作说明</h2>
      <p>这是一个可以直接双击打开的单文件版本，不依赖任何构建工具。打开 <strong>snake-game.html</strong> 就能玩。</p>

      <div class="controls">
        <div>
          <div class="key-row">
            <div class="key">↑</div>
            <div class="key">←</div>
            <div class="key">↓</div>
            <div class="key">→</div>
          </div>
          <p style="margin:10px 0 0;">或使用 WASD 移动</p>
        </div>
        <div>
          <div class="key-row">
            <div class="key space">Space</div>
          </div>
          <p style="margin:10px 0 0;">暂停 / 继续</p>
        </div>
      </div>

      <div class="actions">
        <button id="startBtn">开始 / 重新开始</button>
        <button class="secondary" id="pauseBtn">暂停</button>
      </div>

      <div class="status" id="statusText">
        点击“开始 / 重新开始”开始游戏。<br />
        也可以直接按任意方向键或 WASD 开局。
      </div>

      <div class="mini">
        <span><i class="dot"></i> 支持键盘控制</span>
        <span><i class="dot"></i> 自动记录最高分</span>
        <span><i class="dot"></i> 空格键暂停</span>
      </div>
    </aside>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const bestScoreEl = document.getElementById('bestScore');
      const stateBadge = document.getElementById('stateBadge');
      const overlay = document.getElementById('overlay');
      const statusText = document.getElementById('statusText');
      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');

      const gridSize = 20;
      const cellSize = canvas.width / gridSize;
      const tickMs = 120;
      const bestKey = 'snake-best-score';

      const directions = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 },
        w: { x: 0, y: -1 },
        W: { x: 0, y: -1 },
        s: { x: 0, y: 1 },
        S: { x: 0, y: 1 },
        a: { x: -1, y: 0 },
        A: { x: -1, y: 0 },
        d: { x: 1, y: 0 },
        D: { x: 1, y: 0 },
      };

      let snake;
      let food;
      let direction;
      let nextDirection;
      let score;
      let bestScore;
      let running = false;
      let paused = false;
      let gameOver = false;
      let lastFrameTime = 0;
      let accumulator = 0;

      function setStateBadge(text, tone = 'normal') {
        stateBadge.textContent = text;
        stateBadge.style.color = tone === 'danger' ? 'var(--danger)' : 'var(--text)';
      }

      function setStatus(html) {
        statusText.innerHTML = html;
      }

      function loadBestScore() {
        const saved = Number(localStorage.getItem(bestKey) || '0');
        bestScore = Number.isFinite(saved) ? saved : 0;
        bestScoreEl.textContent = String(bestScore);
      }

      function saveBestScore() {
        localStorage.setItem(bestKey, String(bestScore));
      }

      function resetGame() {
        snake = [
          { x: 9, y: 10 },
          { x: 8, y: 10 },
          { x: 7, y: 10 },
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        running = true;
        paused = false;
        gameOver = false;
        lastFrameTime = performance.now();
        accumulator = 0;
        spawnFood();
        updateUi();
        overlay.classList.add('hidden');
        setStateBadge('进行中');
        setStatus('游戏已开始。用方向键或 WASD 移动，按空格暂停。');
      }

      function updateUi() {
        scoreEl.textContent = String(score);
        bestScoreEl.textContent = String(bestScore);
        pauseBtn.textContent = paused ? '继续' : '暂停';
      }

      function spawnFood() {
        let candidate;
        do {
          candidate = {
            x: Math.floor(Math.random() * gridSize),
            y: Math.floor(Math.random() * gridSize),
          };
        } while (snake.some((segment) => segment.x === candidate.x && segment.y === candidate.y));
        food = candidate;
      }

      function isOpposite(a, b) {
        return a.x === -b.x && a.y === -b.y;
      }

      function handleDirectionChange(input) {
        if (!running) {
          resetGame();
        }

        if (paused || gameOver) {
          return;
        }

        if (!input) {
          return;
        }

        if (!isOpposite(input, direction)) {
          nextDirection = input;
        }
      }

      function togglePause() {
        if (!running || gameOver) {
          resetGame();
          return;
        }

        paused = !paused;
        overlay.classList.toggle('hidden', !paused);
        setStateBadge(paused ? '已暂停' : '进行中');
        setStatus(paused ? '游戏已暂停。按空格或点击“继续”恢复。' : '游戏继续进行。');
        updateUi();
      }

      function endGame() {
        gameOver = true;
        running = false;
        paused = false;
        overlay.classList.remove('hidden');
        setStateBadge('游戏结束', 'danger');
        setStatus('游戏结束。点击“开始 / 重新开始”再来一局，或者直接按任意方向键开始。');
        if (score > bestScore) {
          bestScore = score;
          saveBestScore();
        }
        updateUi();
      }

      function step() {
        direction = nextDirection;
        const head = snake[0];
        const newHead = {
          x: head.x + direction.x,
          y: head.y + direction.y,
        };

        if (newHead.x < 0 || newHead.x >= gridSize || newHead.y < 0 || newHead.y >= gridSize) {
          endGame();
          return;
        }

        const hitsSelf = snake.some((segment) => segment.x === newHead.x && segment.y === newHead.y);
        if (hitsSelf) {
          endGame();
          return;
        }

        snake.unshift(newHead);

        if (newHead.x === food.x && newHead.y === food.y) {
          score += 1;
          if (score > bestScore) {
            bestScore = score;
            saveBestScore();
          }
          spawnFood();
        } else {
          snake.pop();
        }

        updateUi();
      }

      function drawBoard() {
        const width = canvas.width;
        const height = canvas.height;

        if (!snake || !food) {
          ctx.clearRect(0, 0, width, height);
          const gradient = ctx.createLinearGradient(0, 0, width, height);
          gradient.addColorStop(0, '#09111f');
          gradient.addColorStop(1, '#050913');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, width, height);
          drawCenterText('按方向键或 WASD 开始');
          return;
        }

        ctx.clearRect(0, 0, width, height);

        const gradient = ctx.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, '#09111f');
        gradient.addColorStop(1, '#050913');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = '#9bb0d0';
        ctx.lineWidth = 1;
        for (let i = 0; i <= gridSize; i++) {
          const offset = i * cellSize + 0.5;
          ctx.beginPath();
          ctx.moveTo(offset, 0);
          ctx.lineTo(offset, height);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(0, offset);
          ctx.lineTo(width, offset);
          ctx.stroke();
        }
        ctx.restore();

        const foodPulse = 0.5 + 0.5 * Math.sin(performance.now() / 160);
        const foodX = food.x * cellSize;
        const foodY = food.y * cellSize;
        const foodInset = cellSize * (0.18 - foodPulse * 0.03);

        const foodGradient = ctx.createRadialGradient(
          foodX + cellSize / 2,
          foodY + cellSize / 2,
          2,
          foodX + cellSize / 2,
          foodY + cellSize / 2,
          cellSize / 2
        );
        foodGradient.addColorStop(0, '#ffffff');
        foodGradient.addColorStop(0.25, '#ffe66d');
        foodGradient.addColorStop(1, '#ff8b3d');
        ctx.fillStyle = foodGradient;
        roundRect(ctx, foodX + foodInset, foodY + foodInset, cellSize - foodInset * 2, cellSize - foodInset * 2, 8 + foodPulse * 5, true, false);

        snake.forEach((segment, index) => {
          const x = segment.x * cellSize;
          const y = segment.y * cellSize;
          const inset = index === 0 ? 2 : 4;
          const size = cellSize - inset * 2;

          const segmentGradient = ctx.createLinearGradient(x, y, x + cellSize, y + cellSize);
          if (index === 0) {
            segmentGradient.addColorStop(0, '#d9ff8a');
            segmentGradient.addColorStop(1, '#4fd66a');
          } else {
            segmentGradient.addColorStop(0, '#2dd4bf');
            segmentGradient.addColorStop(1, '#70e000');
          }

          ctx.fillStyle = segmentGradient;
          roundRect(ctx, x + inset, y + inset, size, size, index === 0 ? 9 : 7, true, false);

          if (index === 0) {
            ctx.fillStyle = 'rgba(8, 17, 30, 0.9)';
            const eyeSize = cellSize * 0.09;
            const eyeY = y + cellSize * 0.34;
            const eyeOffset = cellSize * 0.2;
            const eyeX = direction.x === -1 ? x + cellSize * 0.28 : x + cellSize * 0.52;
            const secondEyeX = eyeX;
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, eyeSize, 0, Math.PI * 2);
            ctx.arc(secondEyeX, eyeY + eyeOffset, eyeSize, 0, Math.PI * 2);
            ctx.fill();
          }
        });

        if (!running && !gameOver) {
          drawCenterText('按方向键或 WASD 开始');
        }
      }

      function drawCenterText(text) {
        ctx.save();
        ctx.fillStyle = 'rgba(229, 238, 252, 0.88)';
        ctx.font = '600 20px "Segoe UI", "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        ctx.restore();
      }

      function roundRect(context, x, y, width, height, radius, fill = true, stroke = false) {
        const cornerRadius = typeof radius === 'number'
          ? { topLeft: radius, topRight: radius, bottomRight: radius, bottomLeft: radius }
          : radius;

        context.beginPath();
        context.moveTo(x + cornerRadius.topLeft, y);
        context.lineTo(x + width - cornerRadius.topRight, y);
        context.quadraticCurveTo(x + width, y, x + width, y + cornerRadius.topRight);
        context.lineTo(x + width, y + height - cornerRadius.bottomRight);
        context.quadraticCurveTo(x + width, y + height, x + width - cornerRadius.bottomRight, y + height);
        context.lineTo(x + cornerRadius.bottomLeft, y + height);
        context.quadraticCurveTo(x, y + height, x, y + height - cornerRadius.bottomLeft);
        context.lineTo(x, y + cornerRadius.topLeft);
        context.quadraticCurveTo(x, y, x + cornerRadius.topLeft, y);
        context.closePath();
        if (fill) {
          context.fill();
        }
        if (stroke) {
          context.stroke();
        }
      }

      function loop(timestamp) {
        const delta = timestamp - lastFrameTime;
        lastFrameTime = timestamp;

        if (running && !paused && !gameOver) {
          accumulator += delta;
          while (accumulator >= tickMs) {
            step();
            accumulator -= tickMs;
            if (gameOver) {
              break;
            }
          }
        }

        drawBoard();
        requestAnimationFrame(loop);
      }

      document.addEventListener('keydown', (event) => {
        if (event.key === ' ') {
          event.preventDefault();
          togglePause();
          return;
        }

        if (event.key === 'Enter' && gameOver) {
          resetGame();
          return;
        }

        const input = directions[event.key];
        if (input) {
          handleDirectionChange(input);
        }
      });

      startBtn.addEventListener('click', resetGame);
      pauseBtn.addEventListener('click', togglePause);

      loadBestScore();
      setStateBadge('准备开始');
      setStatus('点击“开始 / 重新开始”开始游戏，或直接按方向键 / WASD 开局。');
      overlay.classList.remove('hidden');
      requestAnimationFrame((ts) => {
        lastFrameTime = ts;
        requestAnimationFrame(loop);
      });
    })();
  </script>
</body>
</html>
